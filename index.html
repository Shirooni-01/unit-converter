<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🔄 Unit Converter</h1>
            <p class="subtitle">
                Convert different units quickly and accurately.
            </p>

            <!-- Category -->

            <div class="input-group">

                <label for="category">
                    Category
                </label>

                <select id="category">

                    <option value="length">Length</option>
                    <option value="weight">Weight</option>
                    <option value="temperature">Temperature</option>
                    <option value="volume">Volume</option>
                    <option value="time">Time</option>
                    <option value="storage">Digital Storage</option>

                </select>

            </div>


            <!-- Value -->

            <div class="input-group">

                <label for="value">
                    Value
                </label>

                <input
                    type="number"
                    id="value"
                    placeholder="Enter value"
                >

            </div>


            <!-- From -->

            <div class="input-group">

                <label for="fromUnit">
                    From
                </label>

                <select id="fromUnit"></select>

            </div>


            <!-- Swap -->

            <div class="swap">

                <button id="swapBtn">
                    ⇅ Swap Units
                </button>

            </div>


            <!-- To -->

            <div class="input-group">

                <label for="toUnit">
                    To
                </label>

                <select id="toUnit"></select>

            </div>


            <!-- Convert -->

            <button id="convertBtn" class="convert-btn">
                Convert
            </button>


            <!-- Result -->

            <div class="result-box">

                <h2>Result</h2>

                <p id="result">
                    0
                </p>

                <button id="copyBtn">
                    📋 Copy Result
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
